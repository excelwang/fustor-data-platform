[tool.uv.workspace]
members = [
    "datacast",
    "fustord",
    "benchmark",
    "datacast-core",
    "datacast-sdk",
    "fustord-sdk",
    "datacast/extensions/sender-echo",
    "datacast/extensions/sender-openapi",
    "datacast/extensions/sender-http",
    "fustord/extensions/receiver-http",
    "datacast/extensions/schema-fs",
    "datacast/extensions/source-elasticsearch",
    "datacast/extensions/source-fs",
    "datacast/extensions/source-mysql",
    "datacast/extensions/source-oss",
    "fustord/extensions/view-fs",
    "fustord/extensions/view-fs-forest",
    "datacast-mgmt"
]

[tool.uv.sources]
datacast = { workspace = true }
fustord = { workspace = true }
datacast-core = { workspace = true }
datacast-sdk = { workspace = true }
fustord-sdk = { workspace = true }
datacast-mgmt = { workspace = true }
fustor-sender-echo = { workspace = true }
fustor-sender-openapi = { workspace = true }
fustor-sender-http = { workspace = true }
fustor-receiver-http = { workspace = true }
fustor-schema-fs = { workspace = true }
fustor-source-elasticsearch = { workspace = true }
fustor-source-fs = { workspace = true }
fustor-source-mysql = { workspace = true }
fustor-source-oss = { workspace = true }
fustor-demo = { workspace = true }
fustor-view-fs = { workspace = true }
fustor-view-fs-forest = { workspace = true }
fustor-mgmt = { workspace = true }


[tool.pytest.ini_options]
pythonpath = [
    "datacast/src",
    "fustord/src",
    "datacast-core/src",
    "datacast/extensions/sender-echo/src",
    "datacast/extensions/sender-openapi/src",
    "datacast/extensions/sender-http/src",
    "fustord/extensions/receiver-http/src",
    "datacast/extensions/schema-fs/src",
    "datacast/extensions/source-elasticsearch/src",
    "datacast/extensions/source-fs/src",
    "datacast/extensions/source-mysql/src",
    "datacast/extensions/source-oss/src",
    "fustord/extensions/view-fs/src",
    "fustord/extensions/view-fs-forest/src",
    "datacast-mgmt/src"
]
markers = [
    "timeout: mark test to timeout after X seconds"]
testpaths = [
    "datacast/tests",
    "fustord/tests",
    "datacast-core/tests",
    "datacast/extensions/*/tests",
    "fustord/extensions/*/tests"
]
addopts = "-v --tb=short"
asyncio_mode = "strict"
norecursedirs = ["tests/e2e"]
filterwarnings = [
    "ignore:pythonjsonlogger.jsonlogger:DeprecationWarning",
    "ignore:'crypt' is deprecated and slated for removal:DeprecationWarning:passlib.utils"]

[dependency-groups]
dev = [
    "freezegun>=1.5.5",
    "moto[s3]>=5.1.18",
    "passlib[bcrypt]>=1.7.4",
    "pytest>=8.4.2",
    "pytest-asyncio>=1.2.0",
    "pytest-mock>=3.15.1",
    "python-jose[cryptography]>=3.5.0",
    "ruff>=0.9.0",
    "mypy>=1.14.0",
    "types-pyyaml",
    "types-requests",
    "pytest-cov>=7.0.0",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
check_untyped_defs = true
