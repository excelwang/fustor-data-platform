services:
  fusion:
    build:
      context: ..
      dockerfile: deploy_multi_fs_4node/Dockerfile
    ports:
      - "8101"
      - "18888"
    volumes:
      - ./fusion/config/default.yaml:/root/.fustor/fusion-config/default.yaml
    command: ["fustor-fusion", "start"]
    networks:
      - fustor-net

  sensord1:
    build:
      context: ..
      dockerfile: deploy_multi_fs_4node/Dockerfile
    volumes:
      - ./sensord1/config/default.yaml:/root/.fustor/sensord-config/default.yaml
      - ./sensord1/data:/data
    command: ["fustor-sensord", "start"]
    depends_on:
      - fusion
    networks:
      - fustor-net

  sensord2:
    build:
      context: ..
      dockerfile: deploy_multi_fs_4node/Dockerfile
    volumes:
      - ./sensord2/config/default.yaml:/root/.fustor/sensord-config/default.yaml
      - ./sensord2/data:/data
    command: ["fustor-sensord", "start"]
    depends_on:
      - fusion
    networks:
      - fustor-net

  sensord3:
    build:
      context: ..
      dockerfile: deploy_multi_fs_4node/Dockerfile
    volumes:
      - ./sensord3/config/default.yaml:/root/.fustor/sensord-config/default.yaml
      - ./sensord3/data:/data
    command: ["fustor-sensord", "start"]
    depends_on:
      - fusion
    networks:
      - fustor-net

  sensord4:
    build:
      context: ..
      dockerfile: deploy_multi_fs_4node/Dockerfile
    volumes:
      - ./sensord4/config/default.yaml:/root/.fustor/sensord-config/default.yaml
      - ./sensord4/data:/data
    command: ["fustor-sensord", "start"]
    depends_on:
      - fusion
    networks:
      - fustor-net

networks:
  fustor-net:
    driver: bridge
