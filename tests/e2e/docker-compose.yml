# version is obsolete in compose v2
# Fustor NFS Multi-Mount Consistency Integration Test Environment

# Fustor NFS Multi-Mount Consistency Integration Test Environment
# This setup simulates a real NFS multi-client scenario with:
# - NFS Server: exports shared directory
# - NFS Client A/B: with Fustor datacaststds (Leader/Follower)
# - NFS Client C: no datacaststd (blind-spot simulation)
# - fustord: central service

services:
  # ============ Infrastructure Services ============

  nfs-server:
    image: erichough/nfs-server
    container_name: fustor-nfs-server
    privileged: true
    environment:
      NFS_EXPORT_0: "/exports *(rw,sync,no_subtree_check,no_root_squash)"
    volumes:
      - nfs-data:/exports
    networks:
      - fustor-net
    healthcheck:
      test: [ "CMD", "showmount", "-e", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 30

  fustord:
    image: fustor-integration-fustord
    build:
      context: ../../
      dockerfile: tests/e2e/containers/fustor-services/Dockerfile
    container_name: fustord
    command: [ "fustord", "start" ]
    environment:
      FUSTOR_FUSION_HOST: "0.0.0.0"
      FUSTOR_FUSION_PORT: "8102"
      FUSTOR_LOG_LEVEL: "DEBUG"
      # Use home directory for config
      FUSTOR_HOME: "/root/.fustor"
      # Inject Test Config Vars for envsubst
      TEST_VIEW_ID: "integration-test-ds"
      TEST_API_KEY: "test-api-key-123"
      TEST_SESSION_TIMEOUT: "5"
      AUDIT_INTERVAL: "10.0"
      SENTINEL_INTERVAL: "5.0"
    volumes:
      - fustord-data:/data/fustord
      - ./config/fustord-config:/config/fustord-config
      - ../../fustord/src/fustord:/usr/local/lib/python3.11/site-packages/fustord
      - ../../core/src/fustor_core:/usr/local/lib/python3.11/site-packages/fustor_core
      - ../../fustord-sdk/src/fustord_sdk:/usr/local/lib/python3.11/site-packages/fustord_sdk
      - ../../extensions/view-fs/src/fustor_view_fs:/usr/local/lib/python3.11/site-packages/fustor_view_fs
      - ../../extensions/receiver-http/src/fustor_receiver_http:/usr/local/lib/python3.11/site-packages/fustor_receiver_http
      - ../../extensions/view-fs-forest/src/fustor_view_fs_forest:/usr/local/lib/python3.11/site-packages/fustor_view_fs_forest
      - ../../extensions/source-fs/src/fustor_source_fs:/usr/local/lib/python3.11/site-packages/fustor_source_fs

    ports:
      - "18102:8102"
      - "18889:18888"
    networks:
      - fustor-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8102/" ]
      interval: 5s
      timeout: 3s
      retries: 30

  # ============ NFS Clients with datacaststds ============

  nfs-client-a:
    image: fustor-integration-nfs-client
    build:
      context: ../../
      dockerfile: tests/e2e/containers/nfs-client/Dockerfile
    container_name: fustor-nfs-client-a
    privileged: true
    cap_add:
      - SYS_ADMIN
    environment:
      NFS_SERVER: "nfs-server"
      NFS_PATH: "/exports"
      MOUNT_POINT: "/mnt/shared"
      MOUNT_OPTIONS: "actimeo=1,nolock"
      AGENT_ENABLED: "false"
      AGENT_ID: "datacaststd-a"
      FUSION_ENDPOINT: "http://fustord:18888" # Points to fustord Receiver Port
      API_KEY: "test-api-key-123"
      FUSTOR_LOG_LEVEL: "DEBUG"
      LD_PRELOAD: "/usr/lib/x86_64-linux-gnu/faketime/libfaketime.so.1"
      FAKETIME: "+2 hours"
    volumes:
      - datacaststd-a-data:/datdatacastcastd
      - ./config/datacaststd-config:/confidatacastcastd-config
      - ../../datacaststd/srdatacastcastd:/usr/local/lib/python3.11/site-packadatacasttacastd
      - ../../extensions/source-fs/src/fustor_source_fs:/usr/local/lib/python3.11/site-packages/fustor_source_fs
      - ../../extensions/sender-http/src/fustor_sender_http:/usr/local/lib/python3.11/site-packages/fustor_sender_http
      - ../../extensions/sender-echo/src/fustor_sender_echo:/usr/local/lib/python3.11/site-packages/fustor_sender_echo
      - ../../core/src/fustor_core:/usr/local/lib/python3.11/site-packages/fustor_core
      - ../../datacaststd-sdk/srdatacastcastd_sdk:/usr/local/lib/python3.11/site-packadatacasttacastd_sdk
      - ../../fustord-sdk/src/fustord_sdk:/usr/local/lib/python3.11/site-packages/fustord_sdk
    ports:
      - "18100:8100"
    networks:
      - fustor-net
    depends_on:
      nfs-server:
        condition: service_healthy
      fustord:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "test", "-d", "/mnt/shared" ]
      interval: 5s
      timeout: 3s
      retries: 30

  nfs-client-b:
    image: fustor-integration-nfs-client
    build:
      context: ../../
      dockerfile: tests/e2e/containers/nfs-client/Dockerfile
    container_name: fustor-nfs-client-b
    privileged: true
    cap_add:
      - SYS_ADMIN
    environment:
      NFS_SERVER: "nfs-server"
      NFS_PATH: "/exports"
      MOUNT_POINT: "/mnt/shared"
      MOUNT_OPTIONS: "actimeo=1,nolock"
      AGENT_ENABLED: "false"
      AGENT_ID: "datacaststd-b"
      FUSION_ENDPOINT: "http://fustord:18888" # Points to fustord Receiver Port
      API_KEY: "test-api-key-123"
      FUSTOR_LOG_LEVEL: "DEBUG"
      LD_PRELOAD: "/usr/lib/x86_64-linux-gnu/faketime/libfaketime.so.1"
      FAKETIME: "-1h"
    volumes:
      - datacaststd-b-data:/datdatacastcastd
      - ./config/datacaststd-config:/confidatacastcastd-config
      - ../../datacaststd/srdatacastcastd:/usr/local/lib/python3.11/site-packadatacasttacastd
      - ../../extensions/source-fs/src/fustor_source_fs:/usr/local/lib/python3.11/site-packages/fustor_source_fs
      - ../../extensions/sender-http/src/fustor_sender_http:/usr/local/lib/python3.11/site-packages/fustor_sender_http
      - ../../extensions/sender-echo/src/fustor_sender_echo:/usr/local/lib/python3.11/site-packages/fustor_sender_echo
      - ../../core/src/fustor_core:/usr/local/lib/python3.11/site-packages/fustor_core
      - ../../datacaststd-sdk/srdatacastcastd_sdk:/usr/local/lib/python3.11/site-packadatacasttacastd_sdk
      - ../../fustord-sdk/src/fustord_sdk:/usr/local/lib/python3.11/site-packages/fustord_sdk
    ports:
      - "18103:8100"
    networks:
      - fustor-net
    depends_on:
      nfs-server:
        condition: service_healthy
      fustord:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "test", "-d", "/mnt/shared" ]
      interval: 5s
      timeout: 3s
      retries: 30

  # ============ NFS Client without datacaststd (Blind-spot Simulation) ============

  nfs-client-c:
    image: fustor-integration-nfs-client
    build:
      context: ../../
      dockerfile: tests/e2e/containers/nfs-client/Dockerfile
    container_name: fustor-nfs-client-c
    privileged: true
    cap_add:
      - SYS_ADMIN
    environment:
      NFS_SERVER: "nfs-server"
      NFS_PATH: "/exports"
      MOUNT_POINT: "/mnt/shared"
      MOUNT_OPTIONS: "actimeo=1,nolock"
      AGENT_ENABLED: "false"
    networks:
      - fustor-net
    depends_on:
      nfs-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "test", "-d", "/mnt/shared" ]
      interval: 5s
      timeout: 3s
      retries: 30

networks:
  fustor-net:
    driver: bridge

volumes:
  nfs-data:
  fustord-data:
  datacaststd-a-data:
  datacaststd-b-data:
